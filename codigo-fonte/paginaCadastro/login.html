<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1">
    <meta name="author" content="Geraldo Couto, Gustavo Henrique, Lucas de Oliveira, Victoria de Oliveira">
    <meta name="description" content="Orientação Financeira para você e sua empresa!">
    <meta name="keywords" content="finanças, educação financeira, planejamento financeiro, orçamento, investimentos">

    <title>REFINANCE</title>
    <link rel="stylesheet" href="style-login.css">
</head>

<body>

    <header>
        <nav>
            <a class="logo" href="./index.html">
                <img src="logo-refinance.png" alt="Logo Refinance">
            </a>

            <div class="mobile-menu">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>

            <ul class="nav-list">
                <li><a href="../paginaprimeirospassos/index.html">Primeiros Passos</a></li>
                <li><a href="../paginaperfil/index.html#perfil">Perfil</a></li>
                <li><a href="../paginaserviços/serviços.html">Serviços</a></li>
                <li><a href="../paginasuporte/paginasuporte.html">Suporte</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <div class="content">

            <div id="login">

                <h1>Login</h1>

                <div id="msgError"></div>

                <p class="caixa">
                    <label for="email_login">E-mail</label>
                    <input id="email_login" name="email_login" required type="text" placeholder="Insira seu e-mail">
                </p>

                <p class="caixa">
                    <label for="senha_login">Senha</label>
                    <input id="senha_login" name="senha_login" required type="password" placeholder="Insira sua senha">
                </p>

                <p class="caixa">
                    <input type="checkbox" id="manterlogado">
                    <label for="manterlogado">Manter logado</label>
                </p>

                <p class="caixa">
                    <input type="checkbox" id="Concordo">
                    <label for="Concordo">Concordo e li os termos</label>
                </p>

                <p class="caixa">
                    <button onclick="entrar()" class="login-button" id="botao" type="button">Entrar</button>
                </p>

            </div>

        </div>

    </main>

    <footer class="rodape">
        <p>Copyright &#169; 2026 Refinance | Todos os direitos reservados.</p>
    </footer>

    <script src="../menu/mobile-navbar.js"></script>
    <script src="script-login.js"></script>

</body>

</html>
